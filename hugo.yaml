  homeInfoParams:
    Title: "Eyal Weiss"
    Content: >
      *Postdoctoral scholar | AI & Robotics | Planning, Search & Optimization*
      <br>*Computer Science Faculty, Technion — Israel Institute of Technology*


      ---


      **What I'm passionate about:** AI and robotics, particularly through the lens of planning, search and control.


      <br>


      I am a postdoc at the [Computational Robotics Lab (CRL)](https://crl.cs.technion.ac.il/)
      led by [**Prof. Oren Salzman**](https://orensalzman.com/), in the
      [CS Faculty at the Technion](https://cs.technion.ac.il/).
      My current research spans Search, AI Planning, Motion Planning for robotics, and Combinatorial Optimization.


      ---


      Prior to joining the CRL I had the privilege to conduct my PhD under the supervision of
      [**Prof. Gal A. Kaminka**](http://u.cs.biu.ac.il/~galk/), affiliated with the
      [MAVERICK](http://u.cs.biu.ac.il/~galk/maverick/) research group, in the
      [CS department at BIU](https://www.cs.biu.ac.il/en).
      My research was, and partially still is, devoted to generalizing automated planning
      with dynamically estimated action models, where we combined tools from AI planning,
      graph theory and combinatorial optimization, to endow agents with enhanced planning
      capabilities in challenging (non-classical) setups.


      ---


      Previously, I earned my BSc and MSc in Electrical Engineering at Tel Aviv University,
      where I was fortunate to work with
      [**Prof. Michael Margaliot**](https://sites.google.com/view/michael-margaliot-homepage/home),
      in the [EE school at TAU](https://en-engineering.tau.ac.il/School-of-Electrical-Engineering/main),
      on problems in the fields of control theory and dynamical systems.


      📄 [My complete CV](/cv.pdf)

